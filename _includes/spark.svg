      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#E8651A"/>
    </linearGradient>
  </defs>
  <path d="M50 4 C 66 27 82 42 76 64 C 71 84 61 95 50 95 C 39 95 29 84 24 64 C 18 42 34 27 50 4 Z" fill="url(#flame)"/>
  <path d="M50 41 C 60 54 66 62 66 70.5 C 66 79.5 58.6 86 50 86 C 41.4 86 34 79.5 34 70.5 C 34 62 40 54 50 41 Z" fill="#0c0a08"/>
</svg>
